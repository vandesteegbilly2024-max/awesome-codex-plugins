interface:
  display_name: "Runtype Product Builder"
  short_description: "Build hosted Runtype AI products"
  brand_color: "#6D5EF7"
  default_prompt: "Use $runtype-build-product to design and validate a Runtype AI product."
dependencies:
  tools:
    - type: "mcp"
      value: "runtype"
      description: "Hosted Runtype MCP server for product schemas, catalogs, validators, and creation tools"
      transport: "streamable_http"
      url: "https://api.runtype.com/v1/mcp/protocol"
policy:
  allow_implicit_invocation: true
