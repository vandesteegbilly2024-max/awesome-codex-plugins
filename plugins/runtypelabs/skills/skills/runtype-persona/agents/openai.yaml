interface:
  display_name: "Runtype Persona"
  short_description: "Embed and theme Persona chat widgets"
  brand_color: "#6D5EF7"
  default_prompt: "Use $runtype-persona to embed and theme a Runtype Persona chat widget."
dependencies:
  tools:
    - type: "mcp"
      value: "runtype"
      description: "Hosted Runtype MCP server for Persona embed generation, theme reference, and client tokens"
      transport: "streamable_http"
      url: "https://api.runtype.com/v1/mcp/protocol"
policy:
  allow_implicit_invocation: true
