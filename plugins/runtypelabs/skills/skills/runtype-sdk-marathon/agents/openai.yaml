interface:
  display_name: "Runtype SDK And Marathon"
  short_description: "Use Runtype SDK, CLI, and Marathon"
  brand_color: "#6D5EF7"
  default_prompt: "Use $runtype-sdk-marathon to plan a Runtype SDK or Marathon workflow."
dependencies:
  tools:
    - type: "mcp"
      value: "runtype"
      description: "Hosted Runtype MCP server for SDK reference, flow docs, and platform account context"
      transport: "streamable_http"
      url: "https://api.runtype.com/v1/mcp/protocol"
policy:
  allow_implicit_invocation: true
